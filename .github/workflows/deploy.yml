name: 部署 Cloudflare Worker

on:
  # 代码推送到 main 分支时自动部署（仅 worker 代码变更触发）
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - 'wrangler.jsonc'

  # 手动触发
  workflow_dispatch:

jobs:
  deploy:
    name: 部署 Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      # 刷新 OAuth Token（同 grab workflow）
      - name: 刷新 Cloudflare Token
        id: refresh_token
        run: |
          RESPONSE=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${{ secrets.CF_REFRESH_TOKEN }}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)
          if [ -n "$NEW_TOKEN" ]; then
            echo "cf_token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "cf_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 部署到 Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.refresh_token.outputs.cf_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: 部署成功通知
        run: |
          echo "Worker deployed: https://laobaiepg.laobaitv.workers.dev" >> $GITHUB_STEP_SUMMARY
