name: 抓取 EPG 节目单

on:
  schedule:
    # 每天三次抓取
    - cron: '55 16 * * *'   # 北京时间 00:55
    - cron: '55 0 * * *'    # 北京时间 08:55
    - cron: '55 13 * * *'   # 北京时间 21:55
  workflow_dispatch:
    inputs:
      days:
        description: '抓取天数（留空=使用 sources.yaml 配置的天数）'
        required: false
        default: ''
      channel:
        description: '单频道测试（留空=全部）'
        required: false
        default: ''
      test_mode:
        description: '测试模式（不上传到R2）'
        required: false
        type: boolean
        default: false

jobs:
  grab:
    name: 抓取节目单
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 执行抓取
        env:
          DEBUG: ${{ runner.debug }}
          BRTV_PROXY_URL: ${{ secrets.BRTV_PROXY_URL }}
          BRTV_PROXY_SECRET: ${{ secrets.BRTV_PROXY_SECRET }}
        run: |
          ARGS=""
          # 手动触发时可指定天数，定时触发时不传（使用 sources.yaml 里的 days: 3）
          DAYS="${{ github.event.inputs.days }}"
          if [ -n "$DAYS" ]; then
            ARGS="$ARGS --days $DAYS"
          fi
          CHANNEL="${{ github.event.inputs.channel }}"
          if [ -n "$CHANNEL" ]; then
            ARGS="$ARGS --channel $CHANNEL"
          fi
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          echo "执行: node scripts/grab.js $ARGS"
          node scripts/grab.js $ARGS

      - name: 上传到 Cloudflare R2
        if: ${{ github.event.inputs.test_mode != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          UPLOAD_COUNT=0
          for file in output/*.xml output/*.xml.gz output/*.json; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "上传 $filename..."
              npx wrangler r2 object put "epg-data/xmltv/$filename" --file="$file" --remote
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            fi
          done
          echo "共上传 $UPLOAD_COUNT 个文件"

      - name: 使 KV 缓存失效
        if: ${{ github.event.inputs.test_mode != 'true' }}
        run: |
          KV_ID="${{ secrets.KV_NAMESPACE_ID }}"
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          if [ -n "$KV_ID" ] && [ -n "$CF_TOKEN" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/storage/kv/namespaces/$KV_ID/values/channels_index" \
              -H "Authorization: Bearer $CF_TOKEN")
            echo "KV 缓存清除 HTTP: $HTTP_CODE"
          fi

      - name: 生成抓取摘要
        if: always()
        run: |
          if [ -f "output/channels.json" ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('output/channels.json')); print(len(d))")
            HAS_EPG=$(python3 -c "import json; d=json.load(open('output/channels.json')); print(sum(1 for c in d if c.get('hasEpg')))")
            echo "### EPG 抓取结果" >> $GITHUB_STEP_SUMMARY
            echo "| 项目 | 数量 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 总频道数 | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 有节目单 | $HAS_EPG |" >> $GITHUB_STEP_SUMMARY
            echo "| 完成时间 | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 保存输出为 Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epg-output-${{ github.run_number }}
          path: output/
          retention-days: 7
