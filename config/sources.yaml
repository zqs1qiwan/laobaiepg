# EPG 数据源配置文件
#
# 数据源类型（在 channels.yaml 的 sources[] 中使用）：
#   epgpw_api  - epg.pw JSON API（主力数据源，实时无缓存）
#   tvmao      - 电视猫（北京各子频道等 epg.pw 没有的频道）
#   cctv       - 央视官方 API（备用）
#   tvb        - 香港无线电视（备用）
#   nowtv      - 香港 NOW TV（备用）
#   tbc        - 台湾宽频（备用）

# ========================================================
# 全局抓取设置
# ========================================================
crawl:
  days: 3               # 抓取未来几天的节目单（3天+每天3次抓取=始终保持充足）
  retry: 2              # 失败重试次数
  delay: 300            # 请求间隔毫秒（防止被限速）
  change_source: true   # 主数据源失败时自动切换备用源

# ========================================================
# 输出配置
# ========================================================
output:
  local_dir: "./output"

  files:
    - id: "all"
      filename: "guide.xml"
      groups: []
      note: "完整节目单（所有频道）"

    - id: "mainland"
      filename: "guide_mainland.xml"
      groups: ["央视", "卫视", "卫星", "数字付费"]
      note: "中国大陆频道"

    - id: "hktw"
      filename: "guide_hktw.xml"
      groups: ["港澳台"]
      note: "香港台湾频道"

  r2:
    bucket: "epg-data"
    prefix: "xmltv/"
