# EPG 数据源配置文件
#
# 数据源类型（在 channels.yaml 的 sources[] 中使用）：
#   epgpw_api  - epg.pw JSON API（主力数据源，实时无缓存）
#   tvmao      - 电视猫（北京各子频道等 epg.pw 没有的频道）
#   cctv       - 央视官方 API（备用）
#   cntv       - 央视网（批量API，覆盖广）
#   tvb        - 香港无线电视（备用）
#   nowtv      - 香港 NOW TV（备用）
#   tbc        - 台湾宽频（备用）
#   brtv       - 北京广播电视台（需住宅IP/代理）
#   kankanews  - 看看新闻（上海台，仅当天+昨天）
#   shaanxi    - 陕西广电（仅当天）
#   iqilu      - 齐鲁网（仅当天）
#   tdm        - 澳门广播电视

# ========================================================
# 全局抓取设置
# ========================================================
crawl:
  days: 7               # 默认抓取天数（epgpw_api、cctv、cntv、tvb、nowtv、tbc、tdm 用）
  retry: 2              # 失败重试次数
  delay: 300            # 请求间隔毫秒（防止被限速）
  change_source: true   # 主数据源失败时自动切换备用源

  # ---- 各数据源独立天数配置 ----
  # 不同数据源可用数据天数差异很大，统一用 7 天会导致：
  #   - 仅当天源浪费 6/7 请求（全部返回异常/空）
  #   - tvmao 请求量过大触发限速 → 退避 5 分钟 × N 次 → 超时
  source_days:
    epgpw_api: 7         # 无限速，7 天没问题
    tvmao: 3             # 有严格限速，3 天是安全上限
    cctv: 7              # 官方 API，稳定
    cntv: 7              # 官方 API，支持多天
    tvb: 7               # 稳定
    nowtv: 7             # 稳定
    tbc: 7               # 稳定
    tdm: 7               # 稳定
    brtv: 1              # 仅当天数据可用，历史数据不可靠
    kankanews: 1          # 仅当天+昨天（已有内部过滤，设 1 天由内部逻辑处理）
    shaanxi: 1            # 仅当天数据
    iqilu: 1              # 仅当天数据，未来日期返回 code=1

# ========================================================
# 输出配置
# ========================================================
output:
  local_dir: "./output"

  files:
    - id: "all"
      filename: "guide.xml"
      groups: []
      note: "完整节目单（所有频道）"

    - id: "mainland"
      filename: "guide_mainland.xml"
      groups: ["央视", "卫视", "卫星", "数字付费"]
      note: "中国大陆频道"

    - id: "hktw"
      filename: "guide_hktw.xml"
      groups: ["港澳台"]
      note: "香港台湾频道"

    - id: "overseas"
      filename: "guide_overseas.xml"
      groups: ["海外体育", "海外"]
      note: "海外频道（ESPN/Sky Sports/HBO等）"

  r2:
    bucket: "epg-data"
    prefix: "xmltv/"
