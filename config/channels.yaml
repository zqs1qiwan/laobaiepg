# EPG 频道配置文件
# 每个频道定义一个 id（唯一标识），多个别名，和多个数据源
# 数据源按优先级顺序排列，第一个可用的数据源会被使用
#
# 格式说明：
#   id: 频道唯一标识（英文，会作为 XMLTV channel id）
#   name: 频道显示名称
#   logo: 频道台标 URL（可选）
#   group: 分组（央视/卫视/港澳台/地方台/数字付费）
#   aliases: 别名列表（支持模糊匹配，忽略大小写/空格/全半角）
#   sources: 数据源列表（按优先级）
#     - type: 数据源类型（xmltv_url/cctv/tvmao/tvsou/tvb/nowtv/icable/mod/...)
#       id: 该数据源中的频道 ID
#
# 数据源类型说明：
#   xmltv_url - 从 sources.yaml 中定义的 XMLTV URL 提取（按 channel display-name 匹配）
#   cctv      - 央视官方 API (api.cntv.cn)
#   tvmao     - 电视猫 (tvmao.com)
#   tvsou     - 搜视 (tvsou.com)
#   tvb       - 香港无线电视
#   nowtv     - 香港 NOW TV
#   icable    - 香港有线电视
#   mod       - 台湾中华电信 MOD
#   tbc       - 台湾宽频

